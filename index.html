<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Aeromek | Çok Yakında</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow:wght@300;400&family=Barlow+Condensed:wght@300;400;600;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overflow:hidden}
body{background:#060606;color:#f0f0f0;font-family:'Barlow',sans-serif}

canvas{position:fixed;inset:0;width:100%;height:100%}

.veil{position:fixed;inset:0;background:radial-gradient(ellipse 75% 85% at 50% 50%,rgba(6,6,6,0) 0%,rgba(6,6,6,.72) 100%)}

.page{
  position:fixed;inset:0;
  display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  padding:32px 24px;
  text-align:center;
}

/* ── LOGO ── */
.logo-wrap{
  margin-bottom:28px;
  opacity:0;animation:fadeUp .8s ease .1s forwards;
}
.logo-wrap img{
  width:clamp(180px,20vw,260px);
  height:auto;
  filter:
    drop-shadow(0 0 28px rgba(200,16,46,.35))
    drop-shadow(0 0 60px rgba(200,16,46,.15))
    drop-shadow(0 2px 8px rgba(0,0,0,.8));
}

/* ── EYEBROW ── */
.eyebrow{
  display:flex;align-items:center;gap:14px;
  margin-bottom:14px;
  opacity:0;animation:fadeUp .7s ease .3s forwards;
}
.e-line{width:28px;height:1px;background:#C8102E;flex-shrink:0}
.e-txt{font-family:'Barlow Condensed',sans-serif;font-size:11px;letter-spacing:.26em;color:#C8102E;text-transform:uppercase;font-weight:600}

/* ── MAIN HEADING ── */
.main-title{
  font-family:'Bebas Neue',sans-serif;
  font-size:clamp(80px,13vw,172px);
  line-height:.85;
  letter-spacing:.03em;
  color:#FFFFFF;
  margin-bottom:6px;
  text-shadow:0 0 80px rgba(200,16,46,.2), 0 4px 20px rgba(0,0,0,.6);
  opacity:0;animation:fadeUp .9s cubic-bezier(.16,1,.3,1) .4s forwards;
}

.sub-title{
  font-family:'Bebas Neue',sans-serif;
  font-size:clamp(26px,4.5vw,58px);
  line-height:1;
  color:#C8102E;
  letter-spacing:.06em;
  margin-bottom:22px;
  text-shadow:0 0 40px rgba(200,16,46,.4);
  opacity:0;animation:fadeUp .8s ease .55s forwards;
}

/* ── DESCRIPTION ── */
.desc{
  font-size:clamp(13px,1.5vw,15px);
  color:rgba(255,255,255,.42);
  line-height:1.85;
  max-width:420px;
  margin-bottom:32px;
  font-weight:300;
  opacity:0;animation:fadeUp .7s ease .7s forwards;
}

/* ── EMAIL FORM ── */
.notify-wrap{
  display:flex;gap:0;
  max-width:400px;width:100%;
  margin-bottom:12px;
  opacity:0;animation:fadeUp .7s ease .85s forwards;
  box-shadow:0 8px 32px rgba(0,0,0,.4);
}
.notify-input{
  flex:1;min-width:0;
  background:rgba(255,255,255,.07);
  border:1px solid rgba(255,255,255,.14);
  border-right:none;
  color:#f0f0f0;
  padding:13px 16px;
  font-family:'Barlow',sans-serif;font-size:13px;
  outline:none;transition:border-color .2s;
}
.notify-input:focus{border-color:rgba(200,16,46,.5)}
.notify-input::placeholder{color:rgba(255,255,255,.2)}
.notify-btn{
  background:#C8102E;color:#fff;border:none;
  padding:13px 20px;
  font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:11px;
  letter-spacing:.18em;text-transform:uppercase;
  cursor:pointer;transition:background .2s;white-space:nowrap;flex-shrink:0;
}
.notify-btn:hover{background:#9B0D23}
.notify-msg{
  font-size:11px;color:rgba(255,255,255,.3);
  font-family:'Barlow Condensed',sans-serif;letter-spacing:.1em;
  min-height:18px;margin-bottom:20px;
  opacity:0;transition:opacity .4s;
}

/* ── DIVIDER ── */
.divider{
  width:36px;height:1px;
  background:linear-gradient(to right,transparent,rgba(200,16,46,.5),transparent);
  margin-bottom:20px;
  opacity:0;animation:fadeIn .6s ease 1s forwards;
}

/* ── SOCIAL ── */
.social{
  display:flex;gap:12px;
  opacity:0;animation:fadeUp .6s ease 1.05s forwards;
}
.s-btn{
  width:38px;height:38px;
  border:1px solid rgba(255,255,255,.14);
  border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;transition:border-color .25s,background .25s,transform .2s;
  text-decoration:none;
}
.s-btn:hover{border-color:rgba(200,16,46,.6);background:rgba(200,16,46,.1);transform:translateY(-2px)}
.s-btn svg{width:14px;height:14px;fill:rgba(255,255,255,.45);transition:fill .2s}
.s-btn:hover svg{fill:rgba(255,255,255,.9)}

/* ── CORNERS ── */
.c{position:fixed;width:44px;height:44px;opacity:.2}
.c-tl{top:20px;left:20px;border-top:1px solid #C8102E;border-left:1px solid #C8102E}
.c-tr{top:20px;right:20px;border-top:1px solid #C8102E;border-right:1px solid #C8102E}
.c-bl{bottom:20px;left:20px;border-bottom:1px solid #C8102E;border-left:1px solid #C8102E}
.c-br{bottom:20px;right:20px;border-bottom:1px solid #C8102E;border-right:1px solid #C8102E}

/* ── STATUS ── */
.status{
  position:fixed;bottom:22px;left:50%;transform:translateX(-50%);
  display:flex;align-items:center;gap:8px;
  font-family:'Barlow Condensed',sans-serif;font-size:9px;
  letter-spacing:.24em;color:rgba(255,255,255,.18);text-transform:uppercase;
  opacity:0;animation:fadeIn .6s ease 1.2s forwards;white-space:nowrap;
}
.pulse{width:5px;height:5px;border-radius:50%;background:#C8102E;animation:pulse 2s ease infinite;flex-shrink:0}

/* ── KEYFRAMES ── */
@keyframes fadeUp{from{opacity:0;transform:translateY(18px)}to{opacity:1;transform:none}}
@keyframes fadeIn{to{opacity:1}}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.3;transform:scale(.6)}}

/* ── RESPONSIVE ── */
@media(max-height:680px){
  .logo-wrap{margin-bottom:16px}
  .logo-wrap img{width:clamp(130px,14vw,180px)}
  .main-title{font-size:clamp(64px,10vw,120px)}
  .desc{display:none}
  .notify-wrap{margin-bottom:8px}
}
@media(max-width:420px){
  .desc{display:none}
  .main-title{font-size:clamp(72px,18vw,120px)}
}
</style>
</head>

<script>
const cv=document.getElementById('c'),ctx=cv.getContext('2d');
let W,H,nodes=[];
function resize(){W=cv.width=innerWidth;H=cv.height=innerHeight}
function initNodes(){
  nodes=[];
  const n=Math.floor((W*H)/16000);
  for(let i=0;i<n;i++)nodes.push({
    x:Math.random()*W,y:Math.random()*H,
    vx:(Math.random()-.5)*.22,vy:(Math.random()-.5)*.22,
    r:Math.random()<.12?2.8:1.1,
    red:Math.random()<.09,
    ph:Math.random()*Math.PI*2,
    a:Math.random()*.3+.05
  })
}
resize();initNodes();
window.addEventListener('resize',()=>{resize();initNodes()});

function draw(){
  ctx.clearRect(0,0,W,H);
  /* Radial red glow center */
  const g=ctx.createRadialGradient(W*.5,H*.5,0,W*.5,H*.5,Math.min(W,H)*.55);
  g.addColorStop(0,'rgba(200,16,46,0.05)');g.addColorStop(1,'rgba(0,0,0,0)');
  ctx.fillStyle=g;ctx.fillRect(0,0,W,H);
  /* Connections */
  for(let i=0;i<nodes.length;i++)for(let j=i+1;j<nodes.length;j++){
    const dx=nodes[i].x-nodes[j].x,dy=nodes[i].y-nodes[j].y,d=Math.sqrt(dx*dx+dy*dy);
    if(d<110){
      const a=(1-d/110)*.08,isR=nodes[i].red||nodes[j].red;
      ctx.strokeStyle=isR?`rgba(200,16,46,${a*1.6})`:`rgba(255,255,255,${a})`;
      ctx.lineWidth=.5;ctx.beginPath();ctx.moveTo(nodes[i].x,nodes[i].y);ctx.lineTo(nodes[j].x,nodes[j].y);ctx.stroke();
    }
  }
  /* Dots */
  nodes.forEach(n=>{
    n.x+=n.vx;n.y+=n.vy;n.ph+=.018;
    if(n.x<0||n.x>W)n.vx*=-1;if(n.y<0||n.y>H)n.vy*=-1;
    const a=Math.max(0,n.a+Math.sin(n.ph)*.12);
    ctx.beginPath();ctx.arc(n.x,n.y,n.r,0,Math.PI*2);
    ctx.fillStyle=n.red?`rgba(200,16,46,${a})`:`rgba(255,255,255,${a})`;ctx.fill();
    if(n.red&&n.r>2){ctx.beginPath();ctx.arc(n.x,n.y,n.r*4,0,Math.PI*2);ctx.fillStyle=`rgba(200,16,46,${a*.12})`;ctx.fill()}
  });
  requestAnimationFrame(draw);
}
draw();

async function handleNotify(){
  const inp=document.getElementById('emailInput'),msg=document.getElementById('notifyMsg');
  const btn=document.querySelector('.notify-btn');
  const v=inp.value.trim();
  if(!v||!v.includes('@')){
    msg.style.color='rgba(200,16,46,.75)';
    msg.textContent='Geçerli bir e-posta adresi girin.';
    msg.style.opacity=1;
    return;
  }
  // Loading state
  btn.disabled=true;inp.disabled=true;
  btn.textContent='...';
  try{
    const res=await fetch('https://formspree.io/f/xwvjergj',{
      method:'POST',
      headers:{'Content-Type':'application/json','Accept':'application/json'},
      body:JSON.stringify({email:v,_subject:'Aeromek — Haber Al Talebi'})
    });
    if(res.ok){
      btn.textContent='✓';btn.style.background='#1d6a3e';
      msg.style.color='rgba(255,255,255,.35)';
      msg.textContent='Kayıt alındı. Hazır olduğunda sizi bilgilendireceğiz.';
      msg.style.opacity=1;
    } else {
      throw new Error('server');
    }
  } catch(e){
    btn.disabled=false;inp.disabled=false;
    btn.textContent='Haber Ver';btn.style.background='';
    msg.style.color='rgba(200,16,46,.75)';
    msg.textContent='Bir hata oluştu, lütfen tekrar deneyin.';
    msg.style.opacity=1;
  }
}
document.getElementById('emailInput').addEventListener('keydown',e=>{if(e.key==='Enter')handleNotify();});
</script>
</body>
</html>
