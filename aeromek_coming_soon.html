<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Aeromek | Çok Yakında</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow:wght@300;400&family=Barlow+Condensed:wght@600;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--red:#C8102E;--black:#060606;--white:#F0F0F0;--grey:#666;--border:rgba(255,255,255,0.07)}
html,body{height:100%}
body{background:var(--black);color:var(--white);font-family:'Barlow',sans-serif;font-weight:300;overflow:hidden}

canvas{position:fixed;inset:0;width:100%;height:100%}

.veil{
  position:fixed;inset:0;
  background:radial-gradient(ellipse at 30% 50%, rgba(6,6,6,0.3) 0%, rgba(6,6,6,0.85) 70%);
}

.wrap{
  position:fixed;inset:0;
  display:flex;flex-direction:column;
  justify-content:space-between;
  padding:48px 60px;
}

/* TOP */
.top{display:flex;align-items:center;justify-content:space-between}
.logo{display:flex;align-items:center;gap:10px}
.logo-name{font-family:'Bebas Neue',sans-serif;font-size:20px;letter-spacing:.06em;color:var(--white)}
.logo-tag{font-family:'Barlow Condensed',sans-serif;font-size:8px;letter-spacing:.2em;color:var(--grey);text-transform:uppercase;margin-top:3px}
.status-pill{
  display:flex;align-items:center;gap:8px;
  border:1px solid var(--border);
  padding:8px 16px;
  font-family:'Barlow Condensed',sans-serif;font-size:10px;letter-spacing:.18em;color:var(--grey);text-transform:uppercase
}
.pulse{width:6px;height:6px;border-radius:50%;background:var(--red);animation:pulse 2s ease infinite}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.4;transform:scale(.7)}}

/* MIDDLE */
.mid{max-width:780px}
.eyebrow{display:flex;align-items:center;gap:12px;margin-bottom:24px}
.eline{width:28px;height:1px;background:var(--red)}
.etxt{font-family:'Barlow Condensed',sans-serif;font-size:10px;letter-spacing:.22em;color:var(--red);text-transform:uppercase;font-weight:600}

h1{
  font-family:'Bebas Neue',sans-serif;
  font-size:clamp(64px,9vw,120px);
  line-height:.88;
  margin-bottom:28px;
  overflow:hidden;
}
.line{display:block;overflow:hidden}
.li{display:block;transform:translateY(110%);animation:slideUp .9s cubic-bezier(.16,1,.3,1) forwards}
.li:nth-child(1){animation-delay:.2s}
.li:nth-child(2){animation-delay:.36s}
.accent{color:var(--red)}

.desc{
  font-size:16px;color:rgba(255,255,255,0.55);
  max-width:440px;line-height:1.85;
  opacity:0;animation:fadeUp .7s ease .7s forwards
}

/* NOTIFY */
.notify{
  margin-top:44px;
  display:flex;gap:0;max-width:420px;
  opacity:0;animation:fadeUp .7s ease .9s forwards
}
.notify input{
  flex:1;background:rgba(255,255,255,.04);border:1px solid var(--border);
  border-right:none;color:var(--white);padding:14px 18px;
  font-family:'Barlow',sans-serif;font-size:13px;outline:none;
  transition:border-color .2s
}
.notify input:focus{border-color:rgba(200,16,46,.5)}
.notify input::placeholder{color:rgba(255,255,255,.2)}
.notify button{
  background:var(--red);color:var(--white);border:none;
  padding:14px 24px;cursor:pointer;
  font-family:'Barlow Condensed',sans-serif;font-weight:600;
  font-size:11px;letter-spacing:.16em;text-transform:uppercase;
  transition:background .2s;white-space:nowrap;flex-shrink:0
}
.notify button:hover{background:#9B0D23}
#notifyMsg{
  margin-top:10px;font-size:12px;color:rgba(255,255,255,.35);
  font-family:'Barlow Condensed',sans-serif;letter-spacing:.08em;
  min-height:18px;
}

/* BOTTOM */
.bot{
  display:flex;align-items:flex-end;justify-content:space-between;
  opacity:0;animation:fadeUp .7s ease 1.1s forwards
}
.contact-row{display:flex;flex-direction:column;gap:6px}
.cl{font-family:'Barlow Condensed',sans-serif;font-size:9px;letter-spacing:.2em;color:var(--red);text-transform:uppercase;margin-bottom:2px}
.cv{font-size:13px;color:rgba(255,255,255,.5)}
.divider{width:1px;height:48px;background:var(--border);align-self:stretch}
.copy{font-size:10px;color:rgba(255,255,255,.15);letter-spacing:.05em}

/* BIG BG TEXT */
.bg-text{
  position:fixed;right:-20px;bottom:-20px;
  font-family:'Bebas Neue',sans-serif;
  font-size:clamp(160px,22vw,280px);
  color:rgba(255,255,255,.018);
  line-height:1;letter-spacing:-4px;
  user-select:none;pointer-events:none;
  white-space:nowrap;
}

/* VERTICAL LINE LEFT */
.v-line{
  position:fixed;left:0;top:0;bottom:0;width:2px;
  background:linear-gradient(to bottom, transparent 0%, var(--red) 30%, var(--red) 70%, transparent 100%);
  opacity:.35;
}

@keyframes slideUp{to{transform:translateY(0)}}
@keyframes fadeUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:none}}

/* MOBILE */
@media(max-width:600px){
  .wrap{padding:28px 24px}
  .status-pill{display:none}
  .bot{flex-direction:column;align-items:flex-start;gap:20px}
  .divider{display:none}
  .notify{max-width:100%}
  h1{font-size:clamp(52px,14vw,80px)}
}
</style>
</head>
<body>

<canvas id="c"></canvas>
<div class="veil"></div>
<div class="bg-text">AEROMEK</div>
<div class="v-line"></div>

<div class="wrap">

  <!-- TOP -->
  <div class="top">
    <div class="logo">
      <svg width="34" height="34" viewBox="0 0 40 40" fill="none">
        <polygon points="20,2 38,36 2,36" fill="#232323"/>
        <polygon points="20,8 28,23 12,23" fill="#C8102E"/>
      </svg>
      <div>
        <div class="logo-name">aeromek</div>
        <div class="logo-tag">Atmosferik Su Üretimi</div>
      </div>
    </div>
    <div class="status-pill">
      <div class="pulse"></div>
      Bakım Modu
    </div>
  </div>

  <!-- MIDDLE -->
  <div class="mid">
    <div class="eyebrow">
      <div class="eline"></div>
      <span class="etxt">Çok Yakında</span>
    </div>
    <h1>
      <span class="line"><span class="li">HAVADAN</span></span>
      <span class="line"><span class="li"><span class="accent">SU.</span></span></span>
    </h1>
    <p class="desc">Siteyi son dokunuşlarla hazırlıyoruz. Haber almak için e-postanızı bırakın — hazır olduğunda ilk siz öğrenin.</p>

    <div class="notify">
      <input id="emailInput" type="email" placeholder="email@adresiniz.com">
      <button onclick="submitNotify()">Haber Ver</button>
    </div>
    <div id="notifyMsg"></div>
  </div>

  <!-- BOTTOM -->
  <div class="bot">
    <div class="contact-row">
      <div class="cl">İletişim</div>
      <div class="cv">info@aeromek.com.tr</div>
      <div class="cv">+90 312 000 00 00</div>
    </div>
    <div class="divider"></div>
    <div class="contact-row">
      <div class="cl">Adres</div>
      <div class="cv">Ankara, Türkiye</div>
    </div>
    <div class="copy">© 2025 Aeromek</div>
  </div>

</div>

<script>
/* CANVAS PARTICLES */
const cv=document.getElementById('c');
const cx=cv.getContext('2d');
function resize(){cv.width=innerWidth;cv.height=innerHeight}
resize();
window.addEventListener('resize',resize);

const pts=[];
for(let i=0;i<90;i++){
  pts.push({
    x:Math.random()*cv.width,y:Math.random()*cv.height,
    vx:(Math.random()-.5)*.35,vy:(Math.random()-.5)*.35,
    r:Math.random()*1.8+.3,
    a:Math.random()*.32+.05,
    red:Math.random()>.9,
    ph:Math.random()*Math.PI*2
  });
}
function draw(){
  cx.clearRect(0,0,cv.width,cv.height);
  for(let i=0;i<pts.length;i++){
    for(let j=i+1;j<pts.length;j++){
      const dx=pts[i].x-pts[j].x,dy=pts[i].y-pts[j].y,d=Math.sqrt(dx*dx+dy*dy);
      if(d<80){cx.beginPath();cx.moveTo(pts[i].x,pts[i].y);cx.lineTo(pts[j].x,pts[j].y);cx.strokeStyle=`rgba(200,16,46,${(1-d/80)*.04})`;cx.lineWidth=.5;cx.stroke()}
    }
  }
  pts.forEach(p=>{
    p.x+=p.vx;p.y+=p.vy;p.ph+=.016;
    if(p.x<0||p.x>cv.width)p.vx*=-1;
    if(p.y<0||p.y>cv.height)p.vy*=-1;
    const a=Math.max(0,p.a+Math.sin(p.ph)*.1);
    cx.beginPath();cx.arc(p.x,p.y,p.r,0,Math.PI*2);
    cx.fillStyle=p.red?`rgba(200,16,46,${a})`:`rgba(255,255,255,${a})`;cx.fill();
  });
  requestAnimationFrame(draw);
}
draw();

/* NOTIFY */
function submitNotify(){
  const inp=document.getElementById('emailInput');
  const msg=document.getElementById('notifyMsg');
  const val=inp.value.trim();
  if(!val||!val.includes('@')){msg.style.color='rgba(200,16,46,.7)';msg.textContent='Geçerli bir e-posta adresi girin.';return}
  inp.disabled=true;
  document.querySelector('.notify button').disabled=true;
  document.querySelector('.notify button').textContent='✓ Kaydedildi';
  document.querySelector('.notify button').style.background='#1a6035';
  msg.style.color='rgba(255,255,255,.35)';
  msg.textContent='Hazır olduğunda size haber vereceğiz.';
}
document.getElementById('emailInput').addEventListener('keydown',e=>{if(e.key==='Enter')submitNotify()});
</script>
</body>
</html>
